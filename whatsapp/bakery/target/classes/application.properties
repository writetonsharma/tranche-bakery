spring.application.name=bakery

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/tranche_bakery
spring.datasource.username=${DB_USERNAME:bakery}
spring.datasource.password=${DB_PASSWORD:bakery}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# WhatsApp Cloud API
whatsapp.api.url=https://graph.facebook.com/v19.0
whatsapp.api.token=${WHATSAPP_API_TOKEN}
whatsapp.api.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.webhook.verify-token=tranche-local-2026

# Cutoff time (24h format)
bakery.order.cutoff-hour=18

# Admin credentials — change password before going live
admin.username=admin
admin.password=${ADMIN_PASSWORD:tranche2026}

